<svg viewBox="0 0 440 500" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="440" height="500" fill="#f5f0ea"/>

  <!-- ===== LEFT CARD: Consultant / Strategy ===== -->
  <rect x="28" y="60" width="196" height="290" rx="16" fill="white" stroke="#e0d8d0" stroke-width="1.5"/>

  <!-- Card header bar -->
  <rect x="28" y="60" width="196" height="36" rx="16" fill="#1a1a1a" fill-opacity="0.04"/>
  <rect x="28" y="80" width="196" height="16" fill="#1a1a1a" fill-opacity="0.04"/>
  <rect x="48" y="72" width="56" height="6" rx="3" fill="#e0d8d0"/>
  <circle cx="206" cy="75" r="6" fill="#d65200" fill-opacity="0.35"/>

  <!-- Bar chart in left card -->
  <rect x="54" y="240" width="22" height="68" rx="5" fill="#e8e0d8"/>
  <rect x="84" y="208" width="22" height="100" rx="5" fill="#d65200" fill-opacity="0.4"/>
  <rect x="114" y="174" width="22" height="134" rx="5" fill="#d65200"/>
  <rect x="144" y="195" width="22" height="113" rx="5" fill="#d65200" fill-opacity="0.55"/>
  <rect x="174" y="215" width="22" height="93" rx="5" fill="#d65200" fill-opacity="0.25"/>

  <!-- Trend line -->
  <polyline points="65,252 95,220 125,188 155,207 185,225"
    stroke="#d65200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="185" cy="225" r="4" fill="#d65200"/>

  <!-- Baseline -->
  <line x1="44" y1="310" x2="210" y2="310" stroke="#e0d8d0" stroke-width="1.2"/>

  <!-- Text stub lines in left card -->
  <rect x="48" y="112" width="80" height="6" rx="3" fill="#e0d8d0"/>
  <rect x="48" y="124" width="120" height="6" rx="3" fill="#e0d8d0"/>
  <rect x="48" y="136" width="96" height="6" rx="3" fill="#e0d8d0"/>

  <!-- Left card label tag -->
  <rect x="48" y="330" width="76" height="8" rx="4" fill="#e0d8d0"/>


  <!-- ===== RIGHT CARD: Creator ===== -->
  <rect x="216" y="150" width="196" height="290" rx="16" fill="white" stroke="#e0d8d0" stroke-width="1.5"/>

  <!-- Camera -->
  <rect x="238" y="200" width="110" height="76" rx="8" stroke="#d65200" stroke-width="2" fill="#d65200" fill-opacity="0.06"/>
  <path d="M256 200 L261 184 L330 184 L335 200" stroke="#d65200" stroke-width="2" fill="#d65200" fill-opacity="0.08" stroke-linejoin="round"/>
  <circle cx="293" cy="238" r="22" stroke="#d65200" stroke-width="2" fill="#d65200" fill-opacity="0.07"/>
  <circle cx="293" cy="238" r="12" stroke="#d65200" stroke-width="1.5" fill="#d65200" fill-opacity="0.15"/>
  <circle cx="293" cy="238" r="5" fill="#d65200" fill-opacity="0.65"/>
  <circle cx="331" cy="213" r="5" fill="#d65200" fill-opacity="0.4"/>

  <!-- Content feed cards in right card -->
  <rect x="238" y="300" width="152" height="44" rx="6" fill="#f5f0ea"/>
  <rect x="248" y="312" width="64" height="6" rx="3" fill="#e0d8d0"/>
  <rect x="248" y="324" width="44" height="5" rx="2.5" fill="#e0d8d0"/>
  <rect x="316" y="310" width="62" height="28" rx="4" fill="#d65200" fill-opacity="0.1"/>

  <rect x="238" y="352" width="152" height="44" rx="6" fill="#f5f0ea"/>
  <rect x="248" y="364" width="80" height="6" rx="3" fill="#e0d8d0"/>
  <rect x="248" y="376" width="56" height="5" rx="2.5" fill="#e0d8d0"/>
  <rect x="316" y="362" width="62" height="28" rx="4" fill="#e8e0d8"/>

  <!-- Right card label tag -->
  <rect x="238" y="413" width="76" height="8" rx="4" fill="#e0d8d0"/>

  <!-- Heart accent near camera -->
  <path d="M338 172 C338 169 335 167 333 169 C331 167 328 169 328 172 C328 175 333 180 333 180 C333 180 338 175 338 172Z"
    fill="#d65200" fill-opacity="0.55"/>

  <!-- ===== CONNECTING ORANGE DOT ===== -->
  <circle cx="218" cy="222" r="18" fill="#d65200" fill-opacity="0.13"/>
  <circle cx="218" cy="222" r="8" fill="#d65200" fill-opacity="0.45"/>

</svg>
