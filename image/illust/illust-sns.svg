<svg viewBox="0 0 420 430" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="420" height="430" fill="#f5f0ea"/>

  <!-- Phone shadow -->
  <rect x="127" y="78" width="170" height="322" rx="24" fill="#1a1a1a" fill-opacity="0.05"/>

  <!-- Phone body -->
  <rect x="122" y="72" width="170" height="322" rx="24" fill="white"/>
  <rect x="122" y="72" width="170" height="322" rx="24" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Notch -->
  <rect x="186" y="79" width="42" height="11" rx="5.5" fill="#1a1a1a"/>

  <!-- Screen area -->
  <rect x="134" y="100" width="146" height="272" rx="6" fill="#faf8f5"/>

  <!-- Screen top bar -->
  <rect x="134" y="100" width="146" height="32" rx="6" fill="#1a1a1a"/>
  <rect x="134" y="118" width="146" height="14" fill="#1a1a1a"/>
  <circle cx="152" cy="116" r="5" fill="#d65200"/>
  <rect x="166" y="113" width="52" height="7" rx="3.5" fill="white" fill-opacity="0.2"/>

  <!-- Graph labels (placeholder lines) -->
  <rect x="144" y="142" width="48" height="6" rx="3" fill="#e0d8d0"/>
  <rect x="144" y="153" width="32" height="5" rx="2.5" fill="#e0d8d0"/>

  <!-- Bar chart -->
  <rect x="144" y="263" width="19" height="74" rx="5" fill="#e8e0d8"/>
  <rect x="170" y="232" width="19" height="105" rx="5" fill="#d65200" fill-opacity="0.45"/>
  <rect x="196" y="196" width="19" height="141" rx="5" fill="#d65200"/>
  <rect x="222" y="214" width="19" height="123" rx="5" fill="#d65200" fill-opacity="0.65"/>
  <rect x="248" y="180" width="19" height="157" rx="5" fill="#1a1a1a" fill-opacity="0.1"/>

  <!-- Trend line -->
  <polyline points="154,278 180,247 206,213 232,228 258,196"
    stroke="#d65200" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="258" cy="196" r="5" fill="#d65200"/>
  <circle cx="258" cy="196" r="9" fill="#d65200" fill-opacity="0.18"/>

  <!-- Chart baseline -->
  <line x1="136" y1="339" x2="280" y2="339" stroke="#e0d8d0" stroke-width="1.5"/>

  <!-- Home indicator -->
  <rect x="183" y="370" width="48" height="5" rx="2.5" fill="#e0d8d0"/>

</svg>
