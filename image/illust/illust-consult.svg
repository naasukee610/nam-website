<svg viewBox="0 0 560 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ===== PHONE 1 – left, tilted -14deg ===== -->
  <g transform="translate(148,268) rotate(-14)">
    <!-- Hand -->
    <rect x="-26" y="60" width="52" height="90" rx="16" fill="#c98a62"/>
    <rect x="-22" y="50" width="44" height="45" rx="12" fill="#c98a62"/>
    <rect x="-22" y="48" width="44" height="12" rx="6" fill="#d9a07a"/>
    <!-- Phone body -->
    <rect x="-36" y="-140" width="72" height="128" rx="11" fill="#fdf9f6" stroke="#5a3e2e" stroke-width="2"/>
    <!-- top pill -->
    <rect x="-12" y="-136" width="24" height="5" rx="2.5" fill="#e0d8d0"/>
    <!-- Screen area -->
    <rect x="-29" y="-124" width="58" height="96" rx="4" fill="#f4e8e0"/>
    <!-- Content: creator silhouette -->
    <circle cx="0" cy="-100" r="11" fill="#d65200" fill-opacity="0.22"/>
    <path d="M-14,-78 Q0,-92 14,-78 Q14,-58 0,-58 Q-14,-58 -14,-78Z" fill="#d65200" fill-opacity="0.15"/>
    <!-- label bar -->
    <rect x="-22" y="-52" width="44" height="13" rx="3" fill="#d65200" fill-opacity="0.13"/>
    <rect x="-10" y="-49" width="20" height="3" rx="1.5" fill="#d65200" fill-opacity="0.5"/>
    <!-- home bar -->
    <rect x="-12" y="-18" width="24" height="3" rx="1.5" fill="#e0d8d0"/>
    <!-- Speech bubble top-left -->
    <g transform="translate(-52,-158)">
      <rect x="0" y="0" width="42" height="28" rx="7" fill="#fdf9f6" stroke="#d9cfc7" stroke-width="1.5"/>
      <path d="M28,27 L32,36 L22,27" fill="#fdf9f6" stroke="#d9cfc7" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- heart -->
      <path d="M21,10 C21,7.5 18,6 16.5,8 C15,6 12,7.5 12,10 C12,13.5 16.5,16.5 16.5,16.5 C16.5,16.5 21,13.5 21,10Z" fill="#d65200"/>
    </g>
  </g>

  <!-- ===== PHONE 2 – center, slight tilt +4deg ===== -->
  <g transform="translate(284,274) rotate(4)">
    <!-- Hand -->
    <rect x="-26" y="58" width="52" height="90" rx="16" fill="#ecc89a"/>
    <rect x="-22" y="48" width="44" height="45" rx="12" fill="#ecc89a"/>
    <rect x="-22" y="46" width="44" height="12" rx="6" fill="#f5dbb4"/>
    <!-- Phone body -->
    <rect x="-36" y="-148" width="72" height="134" rx="11" fill="#fdf9f6" stroke="#5a3e2e" stroke-width="2"/>
    <rect x="-12" y="-144" width="24" height="5" rx="2.5" fill="#e0d8d0"/>
    <!-- Screen -->
    <rect x="-29" y="-133" width="58" height="104" rx="4" fill="#ffffff"/>
    <!-- Profile row -->
    <circle cx="-18" cy="-123" r="5" fill="#e8d4c0"/>
    <rect x="-10" y="-127" width="26" height="3.5" rx="1.75" fill="#e8d4c0"/>
    <rect x="-10" y="-121" width="18" height="3" rx="1.5" fill="#ede4da"/>
    <!-- Post image -->
    <rect x="-29" y="-112" width="58" height="44" fill="#f4e8e0"/>
    <circle cx="-8" cy="-90" r="9" fill="#d65200" fill-opacity="0.18"/>
    <circle cx="8" cy="-96" r="6" fill="#d65200" fill-opacity="0.12"/>
    <circle cx="16" cy="-85" r="4" fill="#d65200" fill-opacity="0.1"/>
    <!-- Like bar -->
    <path d="M-24,-63 C-24,-65.5 -27,-67 -28.5,-64.5 C-30,-67 -33,-65.5 -33,-63 C-33,-59.5 -28.5,-57 -28.5,-57 C-28.5,-57 -24,-59.5 -24,-63Z" fill="#d65200"/>
    <rect x="-20" y="-66" width="22" height="3" rx="1.5" fill="#e0d8d0"/>
    <rect x="-29" y="-59" width="42" height="3" rx="1.5" fill="#ede4da"/>
    <rect x="-29" y="-53" width="32" height="3" rx="1.5" fill="#ede4da"/>
    <!-- home bar -->
    <rect x="-14" y="-22" width="28" height="3" rx="1.5" fill="#e0d8d0"/>
    <!-- Floating hearts -->
    <path d="M44,-158 C44,-161 40.5,-163 38.5,-160 C36.5,-163 33,-161 33,-158 C33,-153.5 38.5,-150 38.5,-150 C38.5,-150 44,-153.5 44,-158Z" fill="#d65200" opacity="0.9"/>
    <path d="M56,-140 C56,-142.5 53,-144 51.5,-141.5 C50,-144 47,-142.5 47,-140 C47,-136 51.5,-133 51.5,-133 C51.5,-133 56,-136 56,-140Z" fill="#d65200" opacity="0.65"/>
    <path d="M46,-120 C46,-122 43.5,-123.5 42,-121.5 C40.5,-123.5 38,-122 38,-120 C38,-116.5 42,-114 42,-114 C42,-114 46,-116.5 46,-120Z" fill="#d65200" opacity="0.4"/>
  </g>

  <!-- ===== PHONE 3 – right, tilted +16deg ===== -->
  <g transform="translate(420,258) rotate(16)">
    <!-- Hand -->
    <rect x="-26" y="58" width="52" height="90" rx="16" fill="#f0d3ae"/>
    <rect x="-22" y="48" width="44" height="45" rx="12" fill="#f0d3ae"/>
    <rect x="-22" y="46" width="44" height="12" rx="6" fill="#f8e3c6"/>
    <!-- Phone body -->
    <rect x="-36" y="-144" width="72" height="130" rx="11" fill="#fdf9f6" stroke="#5a3e2e" stroke-width="2"/>
    <rect x="-12" y="-140" width="24" height="5" rx="2.5" fill="#e0d8d0"/>
    <!-- Screen -->
    <rect x="-29" y="-128" width="58" height="98" rx="4" fill="#fdf9f6"/>
    <!-- Chart axes -->
    <line x1="-18" y1="-120" x2="-18" y2="-42" stroke="#e0d8d0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-18" y1="-42"  x2="25"  y2="-42" stroke="#e0d8d0" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Bars (growing L to R) -->
    <rect x="-13" y="-82"  width="11" height="40" rx="2" fill="#d65200" fill-opacity="0.3"/>
    <rect x="-0"  y="-96"  width="11" height="54" rx="2" fill="#d65200" fill-opacity="0.6"/>
    <rect x="13"  y="-114" width="11" height="72" rx="2" fill="#d65200"/>
    <!-- Trend line -->
    <polyline points="-7,-79 6,-92 19,-109" stroke="#e8956a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dots on trend -->
    <circle cx="-7"  cy="-79"  r="2.5" fill="#e8956a"/>
    <circle cx="6"   cy="-92"  r="2.5" fill="#e8956a"/>
    <circle cx="19"  cy="-109" r="2.5" fill="#e8956a"/>
    <!-- home bar -->
    <rect x="-14" y="-22" width="28" height="3" rx="1.5" fill="#e0d8d0"/>
    <!-- Speech bubble top-right -->
    <g transform="translate(22,-162)">
      <rect x="0" y="0" width="50" height="28" rx="7" fill="#fdf9f6" stroke="#d9cfc7" stroke-width="1.5"/>
      <path d="M10,27 L6,36 L16,27" fill="#fdf9f6" stroke="#d9cfc7" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- 3 hearts -->
      <path d="M15,11 C15,8.5 12,7 10.5,9 C9,7 6,8.5 6,11 C6,14 10.5,17 10.5,17 C10.5,17 15,14 15,11Z" fill="#d65200"/>
      <path d="M27,11 C27,8.5 24,7 22.5,9 C21,7 18,8.5 18,11 C18,14 22.5,17 22.5,17 C22.5,17 27,14 27,11Z" fill="#d65200"/>
      <path d="M39,11 C39,8.5 36,7 34.5,9 C33,7 30,8.5 30,11 C30,14 34.5,17 34.5,17 C34.5,17 39,14 39,11Z" fill="#d65200"/>
    </g>
  </g>

</svg>
